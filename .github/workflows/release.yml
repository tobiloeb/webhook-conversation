name: Release

on:
  workflow_dispatch:

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Inject version into manifest
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          sed -i 's/"version": "0.0.0-dev"/"version": "${{ steps.semantic.outputs.new_release_version }}"/' \
            custom_components/webhook_conversation/manifest.json
          sed -i 's/version = "0.0.0-dev"/version = "${{ steps.semantic.outputs.new_release_version }}"/' \
            pyproject.toml

      - name: Create zip
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          cd custom_components/webhook_conversation
          zip -r ../../webhook_conversation.zip .

      - name: Upload zip to release
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          gh release upload ${{ steps.semantic.outputs.new_release_version }} webhook_conversation.zip
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
